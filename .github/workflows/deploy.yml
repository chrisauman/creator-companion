name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-api:
    name: Build & verify API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        working-directory: api
        run: dotnet restore CreatorCompanion.slnx

      - name: Build
        working-directory: api
        run: dotnet build --no-restore --configuration Release CreatorCompanion.slnx

      - name: Test
        working-directory: api
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=normal" CreatorCompanion.slnx

  build-web:
    name: Build & verify web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/creator-companion-web/package-lock.json

      - name: Install dependencies
        working-directory: web/creator-companion-web
        run: npm ci

      - name: Build
        working-directory: web/creator-companion-web
        run: npm run build -- --configuration production

  # ── Deploy ───────────────────────────────────────────────────────────
  # Vercel's GitHub App webhook has degraded silently more than once.
  # Failure mode: GitHub stops delivering push events (or Vercel stops
  # processing them), no error surfaces in either dashboard, and the
  # project just sits N commits behind production indefinitely.
  #
  # Fallback: this job POSTs Vercel's Deploy Hook URL on every push to
  # main. The hook URL lives in the GitHub secret VERCEL_DEPLOY_HOOK
  # (Settings → Secrets and variables → Actions).
  #
  # ── THE TRAP ──
  # The hook returns 2xx the moment Vercel ACCEPTS the POST, not when
  # the build completes. The response is always shaped like
  # {"job":{"id":"…","state":"PENDING","createdAt":…}}, whether the
  # deploy ultimately succeeds OR is silently orphaned.
  #
  # Silent-orphan pattern (May 2026, lost 9 commits): if Vercel's
  # GitHub App is disconnected from the repo, Vercel creates a
  # PENDING job from the hook but has no source to build from — the
  # job dies without ever showing up in the Deployments tab, while
  # `curl --fail` reports success. We burned hours diagnosing a "fix
  # isn't working" loop because the workflow was green and nothing
  # was actually shipping.
  #
  # The verification step below is the only honest signal. It polls
  # the live site for the SHA stamp injected by
  # web/creator-companion-web/scripts/inject-version.mjs and fails
  # red if the new commit doesn't appear within 10 minutes.
  #
  # If verification fails:
  #   1. Vercel → creator-companion-onti → Settings → Git: is the
  #      GitHub repo still "Connected"? Reconnect if not.
  #   2. Vercel → Deployments tab: is there a deployment row for this
  #      commit?
  #        - If no row exists → hook isn't reaching the project.
  #          Re-copy the URL from Settings → Git → Deploy Hooks and
  #          update the GitHub secret VERCEL_DEPLOY_HOOK.
  #        - If a row exists but failed → open it and read the build log.
  #   3. Vercel → Settings → Git → Ignored Build Step: must be
  #      "Automatic". A custom script using bash-only `==` in /bin/sh
  #      silently rejected every build until May 2026 — never use a
  #      custom Ignored Build Step here without a portable POSIX test.
  #
  # Railway is intentionally not in this job — its GitHub App
  # integration delivers pushes correctly; the failures we saw were
  # build-time OOMs, fixed at the Dockerfile level. If Railway's
  # webhook ever degrades like Vercel's did, add a parallel
  # deploy-railway job using RAILWAY_TOKEN + the Railway CLI.
  #
  # ── Root cause of the May 2026 incident ──
  # Two compounding silent skips made backend-only commits look like
  # they shipped while actually being dropped:
  #   1. Vercel project Root Directory = web/creator-companion-web,
  #      so monorepo skip-by-path logic excluded any commit that
  #      didn't touch that subtree (api-only, CI-only, docs-only).
  #   2. Ignored Build Step was set to "Automatic", which applies
  #      that path-based skip even for deploy-hook triggered builds.
  # Fix landed in the Vercel project Settings → Build and Deployment:
  #   - Ignored Build Step: Custom, command `exit 1` (always build)
  #   - Skip deployments when no changes to root directory: Disabled
  # If a backend-only commit ever fails to deploy again, these are
  # the first two places to check.
  #
  # ── Hook URL hygiene ──
  # Disconnecting and reconnecting the Vercel ↔ GitHub link severs
  # a deploy hook's source binding, even though Vercel keeps
  # accepting POSTs to the old URL and returning PENDING. If the
  # verification step fails red and the Vercel Deployments tab
  # shows no row for the commit at all, revoke the hook in Vercel
  # → Settings → Git → Deploy Hooks, create a fresh one for main,
  # and update the VERCEL_DEPLOY_HOOK GitHub secret with the new
  # URL.
  deploy-vercel:
    name: Deploy web to Vercel
    needs: build-web
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        env:
          DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "::error::VERCEL_DEPLOY_HOOK secret is not set. Add it under repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          # POST with no body — Vercel only needs the hook URL to be
          # hit. -f makes curl exit non-zero on any 4xx/5xx, but a 2xx
          # here does NOT mean the deploy will land — see the
          # comment block above and the verification step below.
          echo "POST to Vercel deploy hook (URL redacted)…"
          curl --fail --silent --show-error -X POST "$DEPLOY_HOOK" | tee /tmp/vercel-response.json
          echo ""
          echo "Hook accepted. Verifying the deploy actually reaches production…"

      - name: Verify deploy reached production
        env:
          SITE_URL: https://app.creatorcompanionapp.com
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          # Poll the live site for the cc-build meta tag injected at
          # build time by web/creator-companion-web/scripts/inject-version.mjs.
          # Match against the first 7 chars of the pushed commit's SHA.
          # If we don't see it within 10 minutes, the deploy didn't
          # actually land — fail red so the breakage is visible
          # immediately instead of going unnoticed for days.
          SHORT_SHA="${EXPECTED_SHA:0:7}"
          DEADLINE=$(( $(date +%s) + 600 ))
          LIVE_SHA=""

          echo "Waiting for $SITE_URL to serve cc-build=$SHORT_SHA (10 min ceiling)…"
          while [ $(date +%s) -lt $DEADLINE ]; do
            # `--max-time 10` so a stuck connection can't eat the
            # whole budget on a single attempt.
            LIVE_SHA=$(curl --silent --max-time 10 "$SITE_URL/" \
              | sed -n 's/.*name="cc-build" content="\([a-f0-9]*\)".*/\1/p' \
              | head -1)
            if [ "$LIVE_SHA" = "$SHORT_SHA" ]; then
              echo "✓ Live SHA is $SHORT_SHA — deploy verified."
              exit 0
            fi
            REMAINING=$(( DEADLINE - $(date +%s) ))
            echo "Live SHA is '${LIVE_SHA:-<none>}', expected '$SHORT_SHA'. Re-checking in 20s (${REMAINING}s remaining)…"
            sleep 20
          done

          echo "::error::Deploy did not reach $SITE_URL within 10 min. Live SHA still '${LIVE_SHA:-<none>}', expected '$SHORT_SHA'. Vercel accepted the hook (see previous step) but the build never landed. See troubleshooting checklist in this workflow's comment block."
          exit 1
