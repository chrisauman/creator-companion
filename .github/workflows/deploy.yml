name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-api:
    name: Deploy API to Railway
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Railway deployment
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation { serviceInstanceRedeploy(serviceId: \"9ca5e88b-30c9-45d6-8c3e-1ba097a469b8\", environmentId: \"2efb8a1e-90a0-4fdc-b1dd-147a454959dc\") }"
            }' \
            https://backboard.railway.app/graphql/v2
