name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-api:
    name: Build & verify API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        working-directory: api
        run: dotnet restore CreatorCompanion.slnx

      - name: Build
        working-directory: api
        run: dotnet build --no-restore --configuration Release CreatorCompanion.slnx

      - name: Test
        working-directory: api
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=normal" CreatorCompanion.slnx

  build-web:
    name: Build & verify web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/creator-companion-web/package-lock.json

      - name: Install dependencies
        working-directory: web/creator-companion-web
        run: npm ci

      - name: Build
        working-directory: web/creator-companion-web
        run: npm run build -- --configuration production
