name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-api:
    name: Build & verify API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        working-directory: api
        run: dotnet restore CreatorCompanion.slnx

      - name: Build
        working-directory: api
        run: dotnet build --no-restore --configuration Release CreatorCompanion.slnx

      - name: Test
        working-directory: api
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=normal" CreatorCompanion.slnx

  build-web:
    name: Build & verify web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/creator-companion-web/package-lock.json

      - name: Install dependencies
        working-directory: web/creator-companion-web
        run: npm ci

      - name: Build
        working-directory: web/creator-companion-web
        run: npm run build -- --configuration production

  # ── Deploy ───────────────────────────────────────────────────────────
  # Deploys to Vercel via the Vercel CLI (not Deploy Hooks). The CLI
  # uploads a pre-built artifact directly to Vercel and is independent
  # of the Vercel ↔ GitHub App connection — it just authenticates with
  # an API token and pushes the build. This survives the failure modes
  # that brought down hook-based deploys in May 2026:
  #
  #   1. GitHub App webhook degrading silently (pushes go undelivered
  #      to Vercel for hours/days with no UI indication).
  #   2. Hook URL → project source binding severed by GitHub
  #      disconnect/reconnect (POSTs to the hook URL still return
  #      `{"state":"PENDING"}` but no Deployments-tab row ever
  #      materializes; the job dies silently in Vercel's queue).
  #   3. Monorepo skip-by-path in the project's Root Directory
  #      auto-skipping commits that don't touch the web subtree.
  #
  # None of these affect `vercel deploy --prebuilt --prod` — it bypasses
  # the entire trigger pipeline and uploads the build directly.
  #
  # ── Secrets required ──
  #   - VERCEL_TOKEN        Personal access token, Full Account scope,
  #                         no expiration. Create at
  #                         vercel.com → avatar → Account Settings → Tokens.
  #   - VERCEL_ORG_ID       On Hobby this is the personal Account ID,
  #                         not a team ID. Find in Account Settings →
  #                         General → "Your ID".
  #   - VERCEL_PROJECT_ID   Project ID for creator-companion-onti.
  #                         Find in project Settings → General →
  #                         "Project ID" (starts with prj_).
  #
  # ── Verification ──
  # After `vercel deploy` returns, the live site is polled for the
  # cc-build meta tag injected by inject-version.mjs. The job goes
  # red if the new SHA doesn't reach production within 10 minutes —
  # so future deploy regressions are visible immediately rather than
  # silently rotting for days.
  #
  # If the verify step fails:
  #   1. Read the Vercel CLI output above — `vercel deploy` prints the
  #      deployment URL on success. If it failed, the error message
  #      is in that step.
  #   2. Check Vercel → Deployments tab. The CLI deploy WILL appear
  #      there even if it failed — read its build log.
  #   3. If the CLI itself failed at auth: the VERCEL_TOKEN secret is
  #      expired, revoked, or missing. Recreate at vercel.com.
  #
  # Railway is intentionally not in this job — its GitHub App
  # integration delivers pushes correctly; the failures we saw were
  # build-time OOMs, fixed at the Dockerfile level. If Railway's
  # webhook ever degrades, add a parallel deploy-railway job using
  # RAILWAY_TOKEN + the Railway CLI (same shape as this one).
  deploy-vercel:
    name: Deploy web to Vercel
    needs: build-web
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # `vercel` commands run from the REPO ROOT, NOT from
    # `web/creator-companion-web`. The Vercel project itself has
    # Root Directory configured as `web/creator-companion-web` — if
    # we `cd` into it AND the project has that Root Directory set,
    # the CLI doubles the path: `…/web/creator-companion-web/web/
    # creator-companion-web` and errors with "provided path does
    # not exist". Run from repo root and the project's Root
    # Directory setting resolves correctly.
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/creator-companion-web/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Link & pull Vercel project config
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        # `vercel pull` writes .vercel/project.json (linking this
        # directory to the project identified by the env vars) and
        # downloads project-level config (env vars, framework, build
        # settings) for the build step to consume.
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel CLI
        env:
          # Make the SHA available to inject-version.mjs so the
          # cc-build meta tag matches what the verify step expects.
          # The script falls back to `git rev-parse HEAD` if this is
          # unset, but being explicit is safer.
          VERCEL_GIT_COMMIT_SHA: ${{ github.sha }}
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      # ── Sentry source maps: upload then delete ─────────────────────
      # Why this is two operations glued together:
      #   1. angular.json has sourceMap.hidden=true so .map files are
      #      EMITTED but NOT referenced from the .js bundles. Browsers
      #      don't fetch them; users never see source.
      #   2. Sentry needs them to make minified stack traces readable
      #      — without upload, every Sentry error shows
      #      `m.fn (chunk-XYZ.js:1:8943)` instead of the real file/line.
      #   3. BUT a .map file left in .vercel/output/static would still
      #      be reachable at e.g. /main-XYZ.js.map by anyone who
      #      pattern-matches the bundle filenames. Small info leak but
      #      real. After upload, we delete them from the deploy artifact.
      #
      # Skips silently when SENTRY_AUTH_TOKEN secret is unset so the
      # workflow keeps working before Sentry is configured. Once the
      # three secrets are set as GitHub repo secrets, this becomes
      # active automatically.
      #
      # ── Secrets required ──
      #   - SENTRY_AUTH_TOKEN   org-scope token from
      #                         sentry.io → User Settings → Auth Tokens.
      #                         Scopes needed: project:read, project:releases.
      #   - SENTRY_ORG          Org slug (lowercase, in your Sentry URLs).
      #   - SENTRY_PROJECT_WEB  Project slug for the Angular project
      #                         (lowercase, in the project URL).
      - name: Upload source maps to Sentry (skips if not configured)
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG:        ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT:    ${{ secrets.SENTRY_PROJECT_WEB }}
          RELEASE_SHA:       ${{ github.sha }}
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ] || [ -z "$SENTRY_ORG" ] || [ -z "$SENTRY_PROJECT" ]; then
            echo "Sentry secrets not configured — skipping source map upload."
            echo "  SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:+set}${SENTRY_AUTH_TOKEN:-UNSET}"
            echo "  SENTRY_ORG:        ${SENTRY_ORG:-UNSET}"
            echo "  SENTRY_PROJECT:    ${SENTRY_PROJECT:-UNSET}"
            exit 0
          fi

          STATIC_DIR=.vercel/output/static
          if [ ! -d "$STATIC_DIR" ]; then
            echo "::warning::$STATIC_DIR not found — Vercel build output structure may have changed."
            exit 0
          fi

          # Pin to a known-good major version. sentry-cli 3.x removed the
          # old `releases files <release> upload-sourcemaps` syntax we
          # were using and replaced it with `sourcemaps upload`. Pinning
          # protects us from future breaking changes in 4.x etc.
          SENTRY_CLI="npx @sentry/cli@^3"

          echo "Creating Sentry release $RELEASE_SHA…"
          $SENTRY_CLI releases new "$RELEASE_SHA"

          echo "Uploading source maps from $STATIC_DIR…"
          # New 3.x syntax: `sourcemaps upload` instead of
          # `releases files X upload-sourcemaps`. Rewrite is the
          # default behaviour now (use --no-rewrite to disable);
          # --validate still checks the maps before upload.
          $SENTRY_CLI sourcemaps upload \
            --release "$RELEASE_SHA" \
            --url-prefix '~/' \
            --validate \
            "$STATIC_DIR"

          $SENTRY_CLI releases finalize "$RELEASE_SHA"

          echo "Deleting .map files from deploy artifact (already uploaded to Sentry)…"
          find "$STATIC_DIR" -name '*.js.map' -delete
          find "$STATIC_DIR" -name '*.css.map' -delete
          echo "Source map upload complete."

      - name: Deploy prebuilt artifact to production
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        # `--prebuilt` tells Vercel to use the .vercel/output we just
        # built locally instead of rebuilding on Vercel's side. This
        # bypasses Ignored Build Step, Root Directory skip-logic, and
        # every other server-side filter that broke hook deploys.
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Verify deploy reached production
        env:
          SITE_URL: https://app.creatorcompanionapp.com
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          # Poll the live site for the cc-build meta tag injected at
          # build time by web/creator-companion-web/scripts/inject-version.mjs.
          # Match against the first 7 chars of the pushed commit's SHA.
          # If we don't see it within 10 minutes, the deploy didn't
          # actually land — fail red so the breakage is visible
          # immediately instead of going unnoticed for days.
          SHORT_SHA="${EXPECTED_SHA:0:7}"
          DEADLINE=$(( $(date +%s) + 600 ))
          LIVE_SHA=""

          echo "Waiting for $SITE_URL to serve cc-build=$SHORT_SHA (10 min ceiling)…"
          while [ $(date +%s) -lt $DEADLINE ]; do
            LIVE_SHA=$(curl --silent --max-time 10 "$SITE_URL/" \
              | sed -n 's/.*name="cc-build" content="\([a-f0-9]*\)".*/\1/p' \
              | head -1)
            if [ "$LIVE_SHA" = "$SHORT_SHA" ]; then
              echo "✓ Live SHA is $SHORT_SHA — deploy verified."
              exit 0
            fi
            REMAINING=$(( DEADLINE - $(date +%s) ))
            echo "Live SHA is '${LIVE_SHA:-<none>}', expected '$SHORT_SHA'. Re-checking in 20s (${REMAINING}s remaining)…"
            sleep 20
          done

          echo "::error::Deploy did not reach $SITE_URL within 10 min. Live SHA still '${LIVE_SHA:-<none>}', expected '$SHORT_SHA'. Vercel CLI reported success (see previous step) but the new SHA never appeared on production. See troubleshooting checklist in this workflow's comment block."
          exit 1
