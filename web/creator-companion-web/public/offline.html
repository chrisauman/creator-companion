<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>You're offline — Creator Companion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: #fafaf9;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      color: #1a1a1a;
    }
    .card {
      max-width: 380px;
      width: 100%;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 16px;
      padding: 2.5rem;
      text-align: center;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .icon { font-size: 2.5rem; margin-bottom: 1.25rem; }
    h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: .5rem; }
    p { font-size: .9375rem; color: #666; line-height: 1.6; margin-bottom: 1.75rem; }
    button {
      width: 100%;
      padding: .75rem 1.5rem;
      background: #e91e8c;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: .9375rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { opacity: .9; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✦</div>
    <h1>You're offline</h1>
    <p>Check your connection and try again. Your entries are safe — nothing is lost.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
