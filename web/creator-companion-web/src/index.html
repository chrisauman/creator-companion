<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Creator Companion</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Your daily creative journal. Write every day, build your streak, keep your ideas.">
  <meta name="theme-color" content="#12C4E3">

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.webmanifest">

  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Creator">
  <link rel="apple-touch-icon" href="icons/icon-152x152.png">

  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- Fonts (async-load to avoid render-blocking).
       The previous setup was a synchronous <link rel="stylesheet">
       which made every PWA launch wait on the Google Fonts CSS +
       WOFF2 files before painting — about 10 s of white screen on
       cold mobile networks. The media="print"/onload trick lets
       the browser fetch the stylesheet without blocking render;
       once it lands, JS swaps it to media="all" and the live fonts
       upgrade in (with display=swap on the @font-face declarations
       so the swap is invisible to the user — Inter / Fraunces just
       appear once they're ready). -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;800;900&family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900;1,14..32,400&display=swap"
        media="print"
        onload="this.media='all'">
  <noscript>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;800;900&family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900;1,14..32,400&display=swap">
  </noscript>

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://app.creatorcompanionapp.com">
  <meta property="og:title" content="Creator Companion — The daily journal for creative people">
  <meta property="og:description" content="Build your creative streak. Write every day, track your progress, and never lose what you create.">
  <meta property="og:image" content="https://app.creatorcompanionapp.com/og-image.png">
  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Creator Companion — The daily journal for creative people">
  <meta name="twitter:description" content="Build your creative streak. Write every day, track your progress, and never lose what you create.">
  <meta name="twitter:image" content="https://app.creatorcompanionapp.com/og-image.png">
</head>
<body>
  <!-- Inline pre-boot splash. Renders the moment the HTML parses, so
       the user sees branded content INSTANTLY on PWA launch instead
       of staring at a white screen for the duration of the JS bundle
       download + Angular boot. The fade-out is triggered by Angular's
       initial render: any non-comment child node appearing inside
       <app-root> via the CSS adjacent-sibling trick replaces the
       splash. Inline styles only — no external CSS dependency. -->
  <style>
    .cc-boot-splash {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.25rem;
      background: #0c0e13;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      z-index: 99999;
      pointer-events: none;
      animation: ccBootFade .25s ease-out .15s both;
    }
    .cc-boot-splash__icon {
      width: 96px; height: 96px;
      background-image: url('icons/icon-192x192.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      border-radius: 24px;
    }
    .cc-boot-splash__name {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -.005em;
    }
    .cc-boot-splash__hint {
      font-size: .8125rem;
      color: rgba(255, 255, 255, .55);
      animation: ccBootPulse 1.4s ease-in-out infinite;
    }
    @keyframes ccBootPulse {
      0%, 100% { opacity: .35; }
      50% { opacity: .85; }
    }
    @keyframes ccBootFade {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    /* Once Angular renders ANY content inside <app-root>, hide the
       splash. The selector matches when app-root has a non-empty
       first child (i.e. Angular booted). */
    app-root:not(:empty) ~ .cc-boot-splash,
    app-root[ng-version] + .cc-boot-splash {
      opacity: 0;
      transition: opacity .35s ease;
      pointer-events: none;
    }
  </style>
  <app-root></app-root>
  <div class="cc-boot-splash" aria-hidden="true">
    <div class="cc-boot-splash__icon"></div>
    <div class="cc-boot-splash__name">Creator Companion</div>
    <div class="cc-boot-splash__hint">Loading…</div>
  </div>
  <noscript>Please enable JavaScript to continue using this application.</noscript>
</body>
</html>
